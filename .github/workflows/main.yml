name: Build Android C++ Lib
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up NDK
        uses: nwidger/setup-ndk@v1
        with:
          ndk-version: r26b

      - name: Build with ndk-build
        run: ndk-build -C jni

      - name: Upload Result
        uses: actions/upload-artifact@v4
        with:
          name: ghost_lib
          path: libs/